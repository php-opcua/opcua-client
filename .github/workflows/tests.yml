name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  unit:
    if: ${{ !startsWith(github.event.head_commit.message, '[DOC]') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        php-version: [ '8.2', '8.3', '8.4', '8.5' ]

    name: Unit — PHP ${{ matrix.php-version }} (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: openssl, sockets
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Check code style
        if: matrix.os == 'ubuntu-latest' && matrix.php-version == '8.5'
        run: composer format:check

      - name: Run unit tests
        run: vendor/bin/pest --exclude-group=integration

  integration:
    if: ${{ !startsWith(github.event.head_commit.message, '[DOC]') }}
    runs-on: ubuntu-latest
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        php-version: [ '8.2', '8.3', '8.4', '8.5' ]

    name: Integration — PHP ${{ matrix.php-version }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: openssl, sockets
          coverage: ${{ matrix.php-version == '8.5' && 'xdebug' || 'none' }}

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Start OPC UA test servers
        id: opcua
        uses: php-opcua/uanetstandard-test-suite@v1.2.0

      # open62541 on :24840 for NodeManagement tests (UA-.NETStandard does not
      # implement that service set). Only wired on the 8.5.
      - name: Set up Docker Buildx
        if: matrix.php-version == '8.5'
        uses: docker/setup-buildx-action@v3

      - name: Build open62541 NodeManagement image
        if: matrix.php-version == '8.5'
        uses: docker/build-push-action@v6
        with:
          context: .github/opcua-nodemanagement
          tags: open62541-nm:local
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start open62541 NodeManagement server
        if: matrix.php-version == '8.5'
        run: |
          docker run -d --name opcua-nm -p 24840:4840 open62541-nm:local
          for i in $(seq 1 30); do
            if nc -z localhost 24840; then echo "server up"; break; fi
            sleep 1
          done
          if ! nc -z localhost 24840; then
            echo "server did not start in 30s" >&2
            docker logs opcua-nm || true
            exit 1
          fi
          echo "OPCUA_NODE_MANAGEMENT_ENDPOINT=opc.tcp://localhost:24840" >> $GITHUB_ENV

      - name: Run tests
        env:
          OPCUA_CERTS_DIR: ${{ steps.opcua.outputs.certs-dir }}
        run: vendor/bin/pest --log-junit=results/junit.xml ${{ matrix.php-version == '8.5' && '--coverage-clover=coverage/clover.xml' || '' }}

      - name: Upload coverage to Codecov
        if: matrix.php-version == '8.5'
        uses: codecov/codecov-action@v6
        with:
          files: coverage/clover.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          files: results/junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: test-results
          disable_search: true

      - name: UA-.NETStandard server logs (on failure)
        if: failure()
        working-directory: .uanetstandard-test-suite
        run: docker compose logs --tail=100

      - name: open62541 server logs (on failure)
        if: failure() && matrix.php-version == '8.5'
        run: docker logs opcua-nm --tail=200 || true

      - name: Stop open62541
        if: always() && matrix.php-version == '8.5'
        run: docker rm -f opcua-nm || true
